# sweep.yaml — Performance sweep (maximise training speed)

method: bayes
run_cap: 30
metric:
  name: "perf/sps"
  goal: maximize

parameters:
  num_envs:
    values: [16, 32, 64, 128, 256]

  num_steps:
    values: [64, 128, 256, 512]

  num_minibatches:
    values: [2, 4, 8, 16, 32]

  update_epochs:
    values: [2, 4, 6, 8]

program: ppo.py

command:
  - bash
  - run_sweep.sh
  - --total-timesteps
  - "100000"
  - --track
  - ${args}
