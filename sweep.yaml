# sweep.yaml — Delta-based reward shaping sweep

method: bayes
run_cap: 20
metric:
  name: "curriculum/score"
  goal: maximize

parameters:
  coeff_shaping_location:
    distribution: log_uniform_values
    min: 0.1
    max: 5.0

  coeff_shaping_entity:
    distribution: log_uniform_values
    min: 0.1
    max: 5.0

  coeff_shaping_direction:
    distribution: log_uniform_values
    min: 0.1
    max: 5.0

  coeff_throughput:
    distribution: uniform
    min: 0.5
    max: 0.99

  ent_coef_start:
    distribution: log_uniform_values
    min: 0.005
    max: 0.2

  ent_coef_end:
    distribution: log_uniform_values
    min: 1e-4
    max: 0.01

  learning_rate:
    distribution: log_uniform_values
    min: 5e-5
    max: 1e-3

  # CNN encoder architecture: each layer{1..8} is a conv layer's channel
  # width; width 0 drops the layer (slots compacted in order), so Bayes tunes
  # depth and width as independent ordinal dims. layer1..3 stay positive (min
  # depth 3); layer4..8 may reach 0. kernel_size sets the receptive field
  # (RF = 1 + n_layers * (kernel_size - 1)).
  layer1:
    distribution: int_uniform
    min: 32
    max: 64
  layer2:
    distribution: int_uniform
    min: 32
    max: 64
  layer3:
    distribution: int_uniform
    min: 32
    max: 64
  layer4:
    distribution: int_uniform
    min: 0
    max: 64
  layer5:
    distribution: int_uniform
    min: 0
    max: 64
  layer6:
    distribution: int_uniform
    min: 0
    max: 64
  layer7:
    distribution: int_uniform
    min: 0
    max: 64
  layer8:
    distribution: int_uniform
    min: 0
    max: 64
  kernel_size:
    values: [3, 5]

  clip_coef:
    distribution: uniform
    min: 0.18
    max: 0.32

  gamma:
    distribution: uniform
    min: 0.95
    max: 0.999

  gae_lambda:
    distribution: uniform
    min: 0.8
    max: 0.975

  tile_head_std:
    distribution: log_uniform_values
    min: 0.001
    max: 0.1

  vf_coef:
    distribution: uniform
    min: 0.5
    max: 0.9

  max_grad_norm:
    distribution: uniform
    min: 0.75
    max: 2.5

  adam_epsilon:
    distribution: log_uniform_values
    min: 1e-6
    max: 2e-4

program: ppo.py

command:
  - bash
  - run_sweep.sh
  - --total-timesteps
  - 250_000
  - --track
  - ${args}
