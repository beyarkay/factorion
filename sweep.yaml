# sweep_transformer.yaml — Transformer hyperparameter sweep

method: bayes
run_cap: 30
metric:
  name: "curriculum/score"
  goal: maximize

parameters:
  # Transformer architecture
  d_model:
    values: [32, 64, 128]

  nhead:
    values: [2, 4, 8]

  num_transformer_layers:
    values: [2, 3, 4, 6]

  dim_feedforward:
    values: [64, 128, 256]

  # Output channel dim (shared with heads)
  chan3:
    values: [48, 64]

  # Training hyperparams (re-sweep for transformer)
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3

  ent_coef_start:
    distribution: log_uniform_values
    min: 0.005
    max: 0.2

  ent_coef_end:
    distribution: log_uniform_values
    min: 1e-4
    max: 0.01

  clip_coef:
    distribution: uniform
    min: 0.18
    max: 0.32

  tile_head_std:
    distribution: log_uniform_values
    min: 0.001
    max: 0.1

  max_grad_norm:
    distribution: uniform
    min: 0.5
    max: 2.5

program: ppo.py

command:
  - bash
  - run_sweep.sh
  - --agent
  - transformer
  - --total-timesteps
  - 250_000
  - --track
  - ${args}
