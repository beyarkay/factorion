# Short screening sweep for the masked-encoder PoC — coarse hparams fast, refine
# in a longer sweep later. 30 runs, each ~560s (1/3 of the v5wsblzw baseline's
# 1680s). Objective: maximise val/acc (= masked-entity accuracy).
#
# Launch on the pod (from /workspace/menc, WANDB_API_KEY exported):
#   wandb sweep masked_encoder/sweep.yaml         # prints <sweep_id>
#   nohup wandb agent <sweep_id> > sweep.log 2>&1 &
#
# Ranges widened past the known-good d256/L6/bs32 corner (~9.6GB). bs is capped
# at 32 so the largest capacity corner (d384/L8/bs32, ~19GB) still fits the 24GB
# card — larger bs with big d/layers would OOM-crash and waste a run.
program: masked_encoder/train.py
project: masked-encoder   # must match train.py's wandb.init(project=...) or the sweep can't track runs
method: bayes
metric:
  name: val/acc
  goal: maximize
run_cap: 30
parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.002
  d:
    values: [128, 192, 256, 384]
  layers:
    values: [2, 4, 6, 8]
  heads:
    values: [2, 4, 8]
  bs:
    values: [8, 16, 32, 64]
  mask_frac:
    distribution: uniform
    min: 0.1
    max: 0.25
  # fixed for every trial
  secs:
    value: 560
  cache_n:
    value: 60000
  eval_every:
    value: 50
  ckpt:
    value: /tmp/sweep_enc.pt
command:
  - ${env}
  - python3
  - ${program}
  - ${args}
