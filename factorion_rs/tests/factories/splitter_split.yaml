description: |
  One input belt fans out through a splitter to two sinks. 15 i/s in,
  split evenly, so each sink receives 7.5 i/s. The splitter (2x1) spans
  two rows here because it faces east.
items:
- { x: 0, y: 0, item: copper_cable }   # source
- { x: 4, y: 0, item: copper_cable }   # top sink
- { x: 4, y: 1, item: copper_cable }   # bottom sink
throughput:
- { item: copper_cable, per_second: 7.5 }
- { item: copper_cable, per_second: 7.5 }
graph: |
  stack_inserter@0,0 -> transport_belt@1,0
  transport_belt@1,0 -> splitter@2,0
  splitter@2,0 -> transport_belt@3,0
  splitter@2,0 -> transport_belt@3,1
  splitter@2,1 -> transport_belt@3,0
  splitter@2,1 -> transport_belt@3,1
  transport_belt@3,0 -> bulk_inserter@4,0
  transport_belt@3,1 -> bulk_inserter@4,1
factory: |
  S> b> Y> b> K> ..
  .. .. Y> b> K> ..
