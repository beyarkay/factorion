description: |
  A 2x2 ring of belts, each feeding the next. Every belt connects to exactly
  one downstream belt, so the four form a single closed loop.
graph: |
  transport_belt@0,0 -> transport_belt@1,0
  transport_belt@1,0 -> transport_belt@1,1
  transport_belt@1,1 -> transport_belt@0,1
  transport_belt@0,1 -> transport_belt@0,0
factory: |
  b> bv
  b^ b<
