description: |
  North-facing drill: the marker sits on the fore-edge-center tile and
  the output lands on the belt directly above the body's middle column.
ores:
- { x: 0, y: 4, item: iron_ore, w: 2, h: 1 }
items:
- { x: 1, y: 0, item: iron_ore }
throughput:
- { item: iron_ore, per_second: 0.5 }
graph: |
  m@0,2 -> b@1,1
  b@1,1 -> K@1,0
factory: |
  .. K^ ..
  .. b^ ..
  mmmm^mmm
  mm    mm
  mmmmmmmm
