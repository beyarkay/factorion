description: source drops onto a belt
graph: "S@1,0 -> b@2,0"
factory: |
  .. S> b> ..
---
description: source feeds an inserter (inserter picks up behind it)
graph: "S@1,0 -> i@2,0"
factory: |
  .. S> i> ..
---
description: belt feeds an east-facing splitter (2x1, spans two rows)
graph: "b@1,0 -> Y@2,0"
factory: |
  .. b> Y> ..
  .. .. Y> ..
---
# The belt enters via the splitter's SECOND tile (2,1) — since dual lanes,
# splitter tiles are distinct graph nodes, so the edge names the actual
# tile rather than being remapped to the anchor.
graph: "b@1,1 -> Y@2,1"
factory: |
  .. .. Y> ..
  .. b> Y> ..
---
# Both splitter tiles route to every output (that IS the splitting), so a
# single output belt receives an edge from each tile's pool.
graph: |
  Y@1,0 -> b@2,0
  Y@1,1 -> b@2,0
factory: |
  .. Y> b> ..
  .. Y> .. ..
---
graph: |
  Y@1,0 -> b@2,1
  Y@1,1 -> b@2,1
factory: |
  .. Y> .. ..
  .. Y> b> ..
---
description: east-facing splitter drops onto the belt ahead (from both tiles)
graph: |
  Y@1,0 -> b@2,0
  Y@1,1 -> b@2,0
factory: |
  .. Y> b> ..
  .. Y> .. ..
