name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ruff
        run: uv pip install --system ruff==0.11.8
      - name: Run ruff
        run: ruff check .

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: factorion_rs
      - name: Install dependencies
        run: |
          # uv installs in parallel and caches wheels across runs (enable-cache
          # above), so this is much faster than pip. Only the deps actually
          # imported by the tested modules are installed — marimo, tensorboard
          # and pandas are deliberately omitted (the first two are mocked in
          # tests/test_grid_sizes.py, none are imported at module load).
          uv pip install --system pytest pytest-timeout maturin
          uv pip install --system torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install --system numpy gymnasium networkx tyro tqdm matplotlib plotly wandb runpod requests
      - name: Build and install factorion_rs
        run: cd factorion_rs && maturin build --release --out dist && uv pip install --system dist/*.whl
      - name: Run Python tests
        env:
          WANDB_MODE: disabled
          WANDB_DISABLED: "true"
        run: pytest tests/ -v --timeout=120

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: factorion_rs
      - name: Run Rust tests
        run: cd factorion_rs && cargo test --no-default-features
