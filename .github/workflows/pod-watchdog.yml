name: Pod watchdog

# Reap leaked RunPod pods hourly. Every CI pod encodes its creation time and
# kill-by deadline in its name, so this needs nothing but the RunPod API — it
# catches even pods that never booted far enough to start their own
# self-termination (EXIT trap / in-pod deadline timer), e.g. a pod wedged
# pulling the image. Pods not named factorion-ci-* are never touched. See
# ci/watchdog.py.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runpod
        run: pip install runpod

      - name: Reap expired pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: python -m ci.watchdog
