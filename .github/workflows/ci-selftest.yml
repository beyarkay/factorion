name: CI selftest (temporary)

# TEMPORARY — delete before merging PR #253. Live-fire test of the ci/
# launch path from this branch: push-triggered because workflow_dispatch and
# issue_comment only fire for workflows on the default branch, while push
# runs the branch's own copy (with secrets, since pushes to this repo are
# collaborator-only). Launches one short SFT and one short PPO pod, then
# polls until both self-terminate — proving the EXIT trap actually fires.

on:
  push:
    branches: [claude/ci-infrastructure-rework-026jt1]

permissions:
  contents: read

concurrency:
  group: ci-selftest
  cancel-in-progress: false

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install CI dependencies
        run: uv pip install --system tyro runpod wandb pyyaml requests

      - name: Watchdog dry-run + pod listing
        run: |
          python -m ci watchdog --dry-run
          python -m ci pods

      - name: Launch short SFT run (200k samples, ~5 min)
        run: python -m ci sft --ref "$GITHUB_REF_NAME" --num-samples 200000

      # PPO continues from the checkpoint the SFT run above just produced —
      # the real SFT→PPO handoff, and guaranteed architecture-compatible
      # (pre-existing checkpoints like j0s5y2mc predate the categorical
      # channel encoding and no longer load).
      - name: Wait for the SFT run to finish
        id: sft-run
        run: |
          python - << 'PY'
          import os
          import sys
          import time

          import wandb

          sha7 = os.environ["GITHUB_SHA"][:7]
          deadline = time.time() + 25 * 60
          while time.time() < deadline:
              api = wandb.Api()
              runs = list(
                  api.runs(f"{api.default_entity}/factorion", filters={"tags": f"sha:{sha7}"})
              )
              finished = [r for r in runs if r.state == "finished" and "kind:sft" in r.tags]
              if finished:
                  print(f"SFT run finished: {finished[0].id} ({finished[0].name})")
                  with open("/tmp/sft_run_id", "w") as f:
                      f.write(finished[0].id)
                  sys.exit(0)
              if any("boot-failure" in r.tags for r in runs):
                  print("::error::SFT pod reported a boot failure")
                  sys.exit(1)
              print(f"waiting... {[(r.name, r.state) for r in runs]}")
              time.sleep(30)
          print("::error::SFT run did not finish within 25 min")
          sys.exit(1)
          PY
          echo "run_id=$(cat /tmp/sft_run_id)" >> "$GITHUB_OUTPUT"

      - name: Launch short PPO run from that checkpoint (100k steps, ~8 min)
        run: python -m ci ppo --ref "$GITHUB_REF_NAME" --start-from "${{ steps.sft-run.outputs.run_id }}" --total-timesteps 100000

      - name: Wait for both pods to self-terminate
        run: |
          for i in $(seq 1 70); do
            sleep 30
            ALIVE=$(python -m ci pods | grep -c "factorion-ci-" || true)
            echo "poll ${i}: ${ALIVE} CI pod(s) still alive"
            if [ "$ALIVE" = "0" ]; then
              echo "All CI pods self-terminated."
              exit 0
            fi
          done
          echo "::error::CI pods still alive after 35 min — self-termination failed"
          exit 1

      # Pods disappearing is necessary but not sufficient (a crashed bootstrap
      # also terminates its pod): demand one finished W&B run per kind, and
      # surface any boot-failure logs the pods uploaded before dying.
      - name: Verify the runs actually trained (W&B)
        run: |
          sleep 60
          python - << 'PY'
          import os
          import sys

          import wandb

          api = wandb.Api()
          sha7 = os.environ["GITHUB_SHA"][:7]
          path = f"{api.default_entity}/factorion"
          runs = list(api.runs(path, filters={"tags": f"sha:{sha7}"}))
          for run in runs:
              print(run.id, run.name, run.state, sorted(run.tags))
              if "boot-failure" in run.tags:
                  try:
                      run.file("boot.log").download(root="/tmp/bf", replace=True)
                      print("---- boot.log (tail) ----")
                      print(open("/tmp/bf/boot.log").read()[-8000:])
                      print("-------------------------")
                  except Exception as e:
                      print(f"(could not fetch boot.log: {e})")
          finished = {
              kind: any(
                  run.state == "finished" and f"kind:{kind}" in run.tags
                  for run in runs
              )
              for kind in ("sft", "ppo")
          }
          print(f"finished runs by kind: {finished}")
          if not all(finished.values()):
              print("::error::missing a finished sft/ppo W&B run for this sha")
              sys.exit(1)
          print("Selftest PASSED.")
          PY

      - name: Cleanup any leftover pods
        if: failure() || cancelled()
        run: python -m ci kill --all
