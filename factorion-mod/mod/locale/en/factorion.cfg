[item-name]
factorion-footprint-tool=Factorion footprint tool
factorion-source-tool=Factorion source tool
factorion-sink-tool=Factorion sink tool

[item-description]
factorion-footprint-tool=Click once to stamp the model's fixed 11x11 build region, centered on the chosen tile. Right-click to clear it.
factorion-source-tool=Click a tile inside the region, then choose the item this source provides.
factorion-sink-tool=Click a tile inside the region, then choose the item this sink receives.

[controls]
factorion-execute=Factorion: request prediction
factorion-reset=Factorion: clear footprint, sources and sinks
factorion-give-tools=Factorion: give selection tools

[command-help]
model=Load a Factorion checkpoint: /model <path-or-wandb-id>

[mod-setting-name]
factorion-default-item=Factorion default item

[mod-setting-description]
factorion-default-item=Item preselected when opening a new source or sink picker.
