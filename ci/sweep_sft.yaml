# ci/sweep_sft.yaml — SFT architecture sweep: how to give every head
# global knowledge (issue: MEMORISE_2 kill-test / PR #290 follow-up).
#
# Launched with: uv run python -m ci sweep sft --ref <commitish>  (or comment /ci sweep sft on a PR)
# Sweep results are reported (ci sweep-report), not auto-applied —
# hyperparameter defaults live in training_config.py and are edited by hand.
#
# This sweep optimises the ARCHITECTURE knobs (encoder depth/width/kernel,
# plus the global-context mechanisms added after PR #290), not the training
# hyperparameters — those were tuned by the previous sweep and fall through
# to their training_config.py defaults by simply not being listed here. Only
# lr is co-swept, because a different architecture shifts the lr optimum.
#
# Every global-context mechanism is encoded as a numeric knob whose zero
# value disables it (same trick as the layer1..8 width slots): W&B Bayes has
# no conditional parameter spaces, and zero-off ordinals keep every sampled
# point runnable while letting the mechanisms compose.

method: bayes
run_cap: 60
metric:
  # val/thput_eot, not val/thput: sweep 6y0658g2 measured Spearman 0.38
  # between them — near-independent objectives. thput_eot (throughput at
  # the moment the EOT head fires) is the deliverable: forcing builds to
  # max_steps wrecks factories the model would have stopped at ~0.4.
  name: "val/thput_eot"
  goal: maximize

parameters:
  # Pinned because the metric is monotonic in them: more data / more epochs
  # / a lower max_level make the task trivially easier and Bayes would just
  # saturate them. Pinning num_samples also makes every run directly
  # comparable to the prod checkpoint.
  size:
    value: 11
  num_samples:
    value: 5000000
  epochs:
    value: 1
  max_level:
    value: 0  # auto = 2*size = 22 entities blanked

  # Settled by sweep 6y0658g2 (pinned so the run budget concentrates on
  # the unresolved dims): coord_channels=1 and kernel_size=5 dominated
  # every top run; dilation_growth=2 and a 5th conv layer clearly hurt
  # (both dropped — absent knobs fall through to defaults, dilation 1 /
  # layer5 0); se_ratio 0 and global_feat_dim 0 clearly hurt (0 removed
  # from both, which also kills the inert broadcast/critic-with-no-G
  # combos that wasted runs).
  coord_channels:
    value: 1
  kernel_size:
    value: 5

  # ── LR (the one training hpar that moves with the arch) ──────────
  # Top runs hugged the previous 3e-3 ceiling; extended upward.
  lr:
    distribution: log_uniform_values
    min: 5e-4
    max: 8e-3

  # ── Encoder shape (RF = 1 + n_layers*4 with k=5) ─────────────────
  layer1:
    values: [64, 96]
  layer2:
    values: [64, 96]
  layer3:
    values: [48, 64, 96]
  layer4:
    values: [0, 48, 64]

  # ── Global-context mechanisms, unresolved by sweep 1 ─────────────
  global_feat_dim:
    values: [32, 64]
  global_broadcast:
    values: [0, 1]
  se_ratio:
    values: [4, 8]
  global_critic:
    values: [0, 1]

program: sft.py

# Plain `python`: on a CI pod deps are installed system-wide; locally, run the
# agent under `uv run wandb agent <sweep>` so the venv python is on PATH.
command:
  - ${env}
  - python
  - ${program}
  - --track
  - ${args}
