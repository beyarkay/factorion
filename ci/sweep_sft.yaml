# ci/sweep_sft.yaml — SFT sweep over construction-stage weighting.
#
# Launched with: uv run python -m ci sweep sft --ref <commitish>  (or comment /ci sweep sft on a PR)
# Sweep results are reported (ci sweep-report), not auto-applied —
# hyperparameter defaults live in training_config.py and are edited by hand.
#
# A state with missing fraction f is sampled with normalized weight
# exp(missing_fraction_alpha * f). alpha=0 is the existing uniform weighting;
# increasing alpha focuses progressively more training on early, emptier
# states. The full-vs-complete odds are exp(alpha), so this 0..6 range spans
# 1x through ~403x. Everything else is pinned to the current SFT defaults.

method: bayes
run_cap: 20
metric:
  name: "val/thput_eot"
  goal: maximize

parameters:
  # Fixed run shape.
  size:
    value: 11
  num_samples:
    value: 5000000
  epochs:
    value: 1
  max_level:
    value: 0 # auto = size*size, enough to blank every removable entity

  missing_fraction_alpha:
    distribution: q_uniform
    min: 0.0
    max: 6.0
    q: 0.5

program: sft.py

# Plain `python`: on a CI pod deps are installed system-wide; locally, run the
# agent under `uv run wandb agent <sweep>` so the venv python is on PATH.
command:
  - ${env}
  - python
  - ${program}
  - --track
  - ${args}
