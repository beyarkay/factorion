# ci/sweep_sft.yaml — SFT sweep over the self-attention architecture.
#
# Launched with: uv run python -m ci sweep sft --ref <commitish>  (or comment /ci sweep sft on a PR)
# Sweep results are reported (ci sweep-report), not auto-applied —
# hyperparameter defaults live in training_config.py and are edited by hand.
#
# The 60-run sweep sn7fd8l8 settled the architecture: a self-attention stage
# over the 121-cell encoded map (attn_dim=128, fixed 8 heads / 2 layers /
# learned positional embedding), CoordConv position channels, and the pooled
# mean+max global vector — best val/thput_eot 0.85 vs the ~0.51 conv-only
# baseline. kernel_size=5 never produced a good run; SE gating, dilated convs,
# global-vector broadcast and a global-vector critic were all dead and have
# been removed from the model. What is left to sweep is the handful of dials
# that actually moved the metric: attention capacity, conv width, kernel size,
# and lr.

method: bayes
run_cap: 40
metric:
  # val/thput_eot (throughput at the moment the EOT head fires) is the
  # deliverable and the checkpoint-selection metric; it rank-correlates only
  # ~0.38 with val/thput.
  name: "val/thput_eot"
  goal: maximize

parameters:
  # Pinned: monotonic in the metric (more data / epochs / lower max_level just
  # make the task easier), so Bayes would only saturate them. Pinning
  # num_samples also keeps every run comparable to the prod checkpoint.
  size:
    value: 11
  num_samples:
    value: 5000000
  epochs:
    value: 1
  max_level:
    value: 0  # auto = 2*size = 22 entities blanked

  # ── Attention capacity — the dominant dial (128 > 64 >> 0) ────────
  # 0 keeps the conv-only baseline in the running set as an ablation.
  attn_dim:
    values: [0, 64, 128]

  # ── lr (moves with the arch; the winning region sat ~1.3e-3..2.6e-3) ──
  lr:
    distribution: log_uniform_values
    min: 5e-4
    max: 3e-3

  # ── Conv trunk (kept modest; the point is attention substitutes for
  # giant kernels — kernel 5 never won) ────────────────────────────
  kernel_size:
    values: [3, 5]
  layer1:
    values: [64, 96]
  layer2:
    values: [64, 96]
  layer3:
    values: [64, 96]

program: sft.py

# Plain `python`: on a CI pod deps are installed system-wide; locally, run the
# agent under `uv run wandb agent <sweep>` so the venv python is on PATH.
command:
  - ${env}
  - python
  - ${program}
  - --track
  - ${args}
